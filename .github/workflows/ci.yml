---
name: CI - Build, Test & Security Scan

  on:
    push:
      branches: [master, "add-ci-security"]
    pull_request:
      branches: [master]

  jobs:
    # ─── Job 1: Build and Run Tests ───────────────────────────
    build-and-test:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Compile with Maven
          run: mvn compile

        - name: Run unit tests
          run: mvn test

        - name: Package JAR
          run: mvn package -DskipTests

        - name: Upload JAR artifact
          uses: actions/upload-artifact@v4
          with:
            name: calculator-jar
            path: target/simple-java-calculator-1.0.jar

    # ─── Job 2: Security Scan (runs after build-and-test) ─────
    security-scan:
      runs-on: ubuntu-latest
      needs: build-and-test

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Build project for scan
          run: mvn package -DskipTests

        # --- Veracode Pipeline Scan (Static Analysis / SAST) ---
        - name: Veracode Pipeline Scan
          uses: veracode/veracode-pipeline-scan-action@v1
          with:
            vid: ${{ secrets.VERACODE_API_ID }}
            vkey: ${{ secrets.VERACODE_API_KEY }}
            file: "target/simple-java-calculator-1.0.jar"
            fail_build: "true"

        # --- Veracode SCA (Software Composition Analysis) ---
        - name: Veracode SCA dependency scan
          run: curl -sSL https://download.sourceclear.com/ci.sh | sh
          env:
            SRCCLR_API_TOKEN: ${{ secrets.SRCCLR_API_TOKEN }}